<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주간 모바일 게임 동향 브리프</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root { color-scheme: light;
    --bg:#F4F5F7;
    --panel:#FFFFFF;
    --panel-2:#FAFAFB;
    --border:#E6E8EB;
    --border-soft:#EFF1F4;
    --rule:#111418;
    --text:#111418;
    --text-strong:#06080A;
    --muted:#5B6470;
    --subtle:#A0A6AE;
    --kr:#D14343;
    --kr-soft:#FCE7E7;
    --gl:#2563EB;
    --gl-soft:#DCE7FB;
    --accent:#111418;
    --accent-soft:#EEF0F3;
    --gold:#9C7C2E;
    --highlight:#FFF6D9;
    --shadow:0 1px 2px rgba(15,18,22,.04), 0 1px 2px rgba(15,18,22,.06);
    --shadow-md:0 2px 4px rgba(15,18,22,.04), 0 4px 12px rgba(15,18,22,.05);
    --shadow-lg:0 4px 16px rgba(15,18,22,.08), 0 2px 4px rgba(15,18,22,.04);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body { font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--text); font-size:14.5px; line-height:1.6;
    -webkit-font-smoothing:antialiased; letter-spacing:-0.1px; }
  a { color:var(--text); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1,h2,h3,h4 { margin:0; letter-spacing:-0.45px; font-weight:800; }
  button { font-family:inherit; }

  .topbar { background:var(--panel); border-bottom:1px solid var(--border);
    padding:14px 28px; display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:30; }
  .brand-wrap { display:flex; align-items:center; gap:12px; }
  .brand-mark { width:28px; height:28px; border-radius:8px; background:var(--text-strong);
    color:#fff; display:inline-flex; align-items:center; justify-content:center;
    font-weight:900; font-size:13px; letter-spacing:-0.5px; }
  .brand-text { display:flex; flex-direction:column; }
  .brand { font-weight:800; font-size:16px; color:var(--text-strong); letter-spacing:-0.45px; line-height:1.1; }
  .brand-sub { color:var(--muted); font-size:10.5px; letter-spacing:1.4px; text-transform:uppercase; font-weight:600; margin-top:2px; }
  .topbar-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .chip { background:var(--bg); border:1px solid var(--border); border-radius:999px;
    padding:5px 11px; font-size:11px; color:var(--muted); font-weight:600; letter-spacing:0.2px; }
  .chip.live { background:var(--text-strong); color:#fff; border-color:var(--text-strong); }
  .chip.live::before { content:""; display:inline-block; width:6px; height:6px; border-radius:50%;
    background:#7CD3A0; margin-right:6px; vertical-align:1px; box-shadow:0 0 0 2px rgba(124,211,160,.2); }

  .layout { display:grid; grid-template-columns:260px minmax(0, 1fr); min-height:calc(100vh - 60px); }
  .sidebar { background:var(--panel); border-right:1px solid var(--border); padding:18px 14px;
    position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto; }
  .side-h { font-size:10.5px; text-transform:uppercase; letter-spacing:1.6px; color:var(--subtle);
    font-weight:800; margin:6px 6px 10px; }

  .cal { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:12px; margin-bottom:18px; }
  .cal-hdr { display:flex; align-items:center; justify-content:space-between; padding:2px 4px 10px; }
  .cal-nav { background:none; border:none; cursor:pointer; padding:6px 10px;
    color:var(--muted); font-size:18px; line-height:1; border-radius:6px; transition:background .15s; }
  .cal-nav:hover { background:var(--bg); color:var(--text); }
  .cal-title { font-weight:800; font-size:13px; color:var(--text-strong); letter-spacing:-0.2px; }
  .cal-dow { display:grid; grid-template-columns:repeat(7, 1fr); gap:1px; padding:0 2px 4px; }
  .cal-dow span { text-align:center; font-size:10px; color:var(--subtle); font-weight:700; padding:4px 0;
    letter-spacing:0.4px; }
  .cal-weeks { display:flex; flex-direction:column; gap:2px; }
  .cal-week { display:grid; grid-template-columns:repeat(7, 1fr); gap:1px;
    border-radius:6px; padding:2px; cursor:default; position:relative;
    transition:background .12s, transform .12s; }
  .cal-week.has-data { cursor:pointer; }
  .cal-week.has-data:hover { background:var(--accent-soft); }
  .cal-week.has-data::after { content:""; position:absolute; right:5px; top:50%;
    width:4px; height:4px; border-radius:50%; background:var(--gold);
    transform:translateY(-50%); }
  .cal-week.active { background:var(--text-strong); }
  .cal-week.active::after { display:none; }
  .cal-week.active .cal-day { color:#fff; }
  .cal-week.active .cal-day.outside { color:#aaa; }
  .cal-day { text-align:center; font-size:11.5px; padding:4px 0; color:var(--text);
    font-variant-numeric:tabular-nums; font-weight:500; }
  .cal-day.outside { color:var(--subtle); opacity:0.5; }
  .cal-day.today { color:var(--kr); font-weight:800; }
  .cal-week.active .cal-day.today { color:#FFB4B4; }

  .toc { padding:14px; background:var(--panel); border:1px solid var(--border); border-radius:10px; }
  .toc-h { font-size:10.5px; text-transform:uppercase; letter-spacing:1.6px; color:var(--subtle);
    font-weight:800; margin-bottom:12px; }
  .toc-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0;
    font-size:12.5px; color:var(--muted); cursor:pointer; transition:color .12s; }
  .toc-item:hover { color:var(--text-strong); }
  .toc-item .n { background:var(--accent-soft); border-radius:4px; padding:1px 8px;
    font-size:10.5px; font-weight:800; color:var(--text-strong); min-width:24px; text-align:center;
    font-variant-numeric:tabular-nums; }

  .main { min-width:0; }
  .masthead { background:var(--panel); border-bottom:1px solid var(--border); padding:44px 48px 36px; }
  .masthead-inner { max-width:1300px; margin:0 auto; }
  .masthead-overline { font-size:11px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--gold); font-weight:800; margin-bottom:14px; display:inline-flex; align-items:center; gap:10px; }
  .masthead-overline::before { content:""; width:24px; height:2px; background:var(--gold); }
  .masthead-title { font-size:40px; font-weight:800; color:var(--text-strong);
    letter-spacing:-1.5px; line-height:1.18; margin-bottom:14px; }
  .masthead-id-line { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    padding-top:14px; border-top:1px solid var(--border); }
  .masthead-id { font-weight:800; font-size:13px; color:var(--text-strong); letter-spacing:0.3px; font-variant-numeric:tabular-nums; }
  .masthead-range { color:var(--muted); font-size:13px; }
  .masthead-meta { color:var(--subtle); font-size:12px; }
  .masthead-summary { margin-top:18px; font-size:15px; line-height:1.75; color:var(--text); max-width:920px; }

  .stat-row { display:grid; grid-template-columns:repeat(4, 1fr); margin-top:26px;
    border-top:1px solid var(--rule); border-bottom:1px solid var(--rule); }
  .stat { padding:16px 18px; border-right:1px solid var(--border); }
  .stat:last-child { border-right:none; }
  .stat-num { font-weight:800; font-size:30px; color:var(--text-strong); line-height:1; letter-spacing:-0.8px; font-variant-numeric:tabular-nums; }
  .stat-label { font-size:10.5px; text-transform:uppercase; letter-spacing:1.4px; color:var(--muted);
    font-weight:700; margin-top:7px; }

  .content { padding:36px 48px 80px; }
  .content-inner { max-width:1300px; margin:0 auto; }

  .section { margin-top:48px; }
  .section:first-child { margin-top:0; }
  .section-hdr { display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--rule); padding-bottom:12px; margin-bottom:22px; gap:14px; flex-wrap:wrap; }
  .section-hdr-left { display:flex; align-items:baseline; gap:14px; }
  .section-num { font-size:34px; font-weight:800; color:var(--accent); line-height:0.9;
    letter-spacing:-1.4px; font-variant-numeric:tabular-nums; }
  .section-title-block { display:flex; flex-direction:column; gap:2px; }
  .section-title { font-size:20px; font-weight:800; color:var(--text-strong); letter-spacing:-0.5px; }
  .section-sub { font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .section-balance { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .bal-pill { font-size:10.5px; letter-spacing:0.4px; font-weight:800; padding:4px 10px; border-radius:999px; font-variant-numeric:tabular-nums; }
  .bal-pill.kr { background:var(--kr-soft); color:var(--kr); }
  .bal-pill.gl { background:var(--gl-soft); color:var(--gl); }
  .bal-pill.total { background:var(--text-strong); color:#fff; }

  .games { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
  .game-card { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:22px 24px 20px; box-shadow:var(--shadow); position:relative; overflow:hidden;
    display:flex; flex-direction:column; gap:14px; transition:box-shadow .15s, transform .15s; }
  .game-card:hover { box-shadow:var(--shadow-md); }
  .game-card.featured { grid-column:1 / -1; padding:26px 28px 24px;
    background:linear-gradient(180deg, #FFFBF1 0%, #FFFFFF 50%); border-color:#F0E2BC; }
  .game-card .num { font-size:11px; font-weight:800; color:var(--gold); letter-spacing:1.2px; font-variant-numeric:tabular-nums; }
  .game-card.featured .num::before { content:"FEATURED ·  "; color:var(--gold); }
  .game-head { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .game-emoji { font-size:22px; line-height:1; }
  .game-card.featured .game-emoji { font-size:26px; }
  .game-icon { width:34px; height:34px; border-radius:8px; vertical-align:middle;
    align-self:center; box-shadow:0 1px 3px rgba(0,0,0,.14); background:#fff; flex:0 0 auto; }
  .game-card.featured .game-icon { width:42px; height:42px; border-radius:10px; }
  .game-title { font-size:21px; font-weight:800; color:var(--text-strong); letter-spacing:-0.55px; line-height:1.2; }
  .game-card.featured .game-title { font-size:26px; letter-spacing:-0.9px; }
  .game-genre { color:var(--muted); font-size:13px; }
  .game-genre::before { content:"·"; margin-right:8px; color:var(--subtle); }
  .field-list { display:grid; grid-template-columns:max-content 1fr; column-gap:14px; row-gap:7px; }
  .field-l { font-size:10.5px; letter-spacing:1.3px; text-transform:uppercase; color:var(--muted);
    font-weight:800; padding-top:5px; white-space:nowrap; }
  .field-v { font-size:14px; line-height:1.65; color:var(--text); word-break:break-word; }
  .game-card .source-link { display:inline-block; font-size:11.5px; color:var(--gl);
    margin-top:4px; padding-top:12px; border-top:1px dashed var(--border); word-break:break-all; }
  .game-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; }
  .game-card.kr::before { background:var(--kr); }
  .game-card.gl::before { background:var(--gl); }

  .compact-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; }
  .news-card { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px 20px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
    position:relative; overflow:hidden; transition:box-shadow .15s; }
  .news-card:hover { box-shadow:var(--shadow-md); }
  .news-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; }
  .news-card.kr::before { background:var(--kr); }
  .news-card.gl::before { background:var(--gl); }
  .news-num { font-size:10.5px; font-weight:800; color:var(--gold); letter-spacing:1.2px; font-variant-numeric:tabular-nums; }
  .news-head { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .news-emoji { font-size:17px; line-height:1; }
  .news-icon { width:20px; height:20px; border-radius:5px; vertical-align:middle;
    align-self:center; box-shadow:0 1px 2px rgba(0,0,0,.12); background:#fff;
    flex:0 0 auto; object-fit:contain; }
  .news-title { font-size:16px; font-weight:800; color:var(--text-strong); letter-spacing:-0.4px;
    line-height:1.32; flex:1; min-width:0; }
  .news-body { font-size:13px; line-height:1.65; color:var(--text); }
  .news-source { margin-top:auto; padding-top:10px; border-top:1px dashed var(--border);
    font-size:11.5px; color:var(--muted); }
  .news-source a { color:var(--gl); }

  .badge { display:inline-flex; align-items:center; padding:2px 7px; border-radius:4px;
    font-size:10px; font-weight:800; letter-spacing:0.6px; }
  .badge-kr { background:var(--kr-soft); color:var(--kr); }
  .badge-gl { background:var(--gl-soft); color:var(--gl); }

  .placeholder { background:var(--panel); border:1px dashed var(--border); padding:60px 24px;
    text-align:center; color:var(--muted); border-radius:10px; }
  .placeholder .icon { font-size:36px; opacity:0.6; margin-bottom:8px; }
  .placeholder h2 { color:var(--text-strong); font-size:18px; margin:8px 0 6px; }
  .loading { padding:60px; text-align:center; color:var(--muted); font-size:13px; }
  .empty-state { padding:14px; color:var(--muted); font-size:12px; text-align:center; }

  .footer-note { text-align:center; color:var(--subtle); font-size:11px; padding:40px 16px 16px;
    letter-spacing:0.3px; }
  .footer-note a { color:var(--muted); }

  /* INLINE HIGHLIGHTS */
  .hl-money { color:#B45309; font-weight:800; font-variant-numeric:tabular-nums; }
  .hl-up    { color:#15803D; font-weight:800; font-variant-numeric:tabular-nums; }
  .hl-down  { color:#B91C1C; font-weight:800; font-variant-numeric:tabular-nums; }
  .hl-pct   { color:#0F1419; font-weight:800; font-variant-numeric:tabular-nums; }
  .hl-rank  { color:#0F1419; font-weight:800;
              background:linear-gradient(180deg, transparent 60%, #FFE898 60%);
              padding:0 2px; }
  .hl-num   { color:#0F766E; font-weight:800; font-variant-numeric:tabular-nums; }
  .hl-date  { color:#0F1419; font-weight:800; font-variant-numeric:tabular-nums; }

  @media (max-width: 1100px) {
    .games { grid-template-columns:1fr; }
    .game-card.featured { grid-column:auto; }
    .compact-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
  }
  @media (max-width: 820px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
    .masthead { padding:28px 22px; }
    .masthead-title { font-size:28px; letter-spacing:-1px; }
    .content { padding:28px 22px 60px; }
    .stat-row { grid-template-columns:repeat(2, 1fr); }
    .stat:nth-child(2) { border-right:none; }
    .stat:nth-child(1), .stat:nth-child(2) { border-bottom:1px solid var(--border); }
    .compact-grid { grid-template-columns:1fr; }
    .section-num { font-size:26px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-wrap">
    <div class="brand-mark">W</div>
    <div class="brand-text">
      <div class="brand">주간 모바일 게임 동향 브리프</div>
      <div class="brand-sub">Weekly Mobile Gaming Brief</div>
    </div>
  </div>
  <div class="topbar-meta" id="topbar-meta">
    <span class="chip live">매주 월요일 09:30 자동 갱신</span>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="side-h">주차 선택</div>
    <div class="cal" id="calendar"><div class="empty-state">로딩 중...</div></div>
    <div class="toc" id="tocBlock" style="display:none;">
      <div class="toc-h">이번 호 목차</div>
      <div class="toc-item" data-toc="games"><span>신작 · 업데이트</span><span class="n" id="cnt-games">·</span></div>
      <div class="toc-item" data-toc="charts"><span>차트 · 순위</span><span class="n" id="cnt-charts">·</span></div>
      <div class="toc-item" data-toc="industry"><span>업계 뉴스</span><span class="n" id="cnt-industry">·</span></div>
      <div class="toc-item" data-toc="marketing"><span>마케팅 동향</span><span class="n" id="cnt-marketing">·</span></div>
    </div>
  </aside>
  <main class="main" id="main"><div class="loading">데이터 로딩 중...</div></main>
</div>

<script>
(function () {
  var INDEX_URL = "./data/index.json";
  var WEEK_URL  = function (id) { return "./data/" + id + ".json"; };
  var VER_URL   = "./data/version.json";
  var HMARK     = "__HLPH__";

  function esc(s) { if (s == null) return "";
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c]; }); }

  function highlight(text) {
    if (text == null || text === "") return "";
    var s = esc(text);
    var holders = [];
    function stash(match, cls) {
      var idx = holders.length;
      holders.push({ cls: cls, content: match });
      return HMARK + idx + HMARK;
    }
    // Money — order matters
    s = s.replace(/\d+(?:[,.]\d+)*조(?:\s*\d+(?:[,.]\d+)*억)?(?:\s*원)?/g,
      function (m) { return stash(m, "hl-money"); });
    s = s.replace(/\d+(?:[,.]\d+)*억\s*(?:원|달러)/g,
      function (m) { return stash(m, "hl-money"); });
    s = s.replace(/\d+(?:[,.]\d+)*만\s*원/g,
      function (m) { return stash(m, "hl-money"); });
    s = s.replace(/\$\d+(?:[,.]\d+)*\s*[KMB]?/g,
      function (m) { return stash(m, "hl-money"); });
    s = s.replace(/\d+(?:[,.]\d+)*억(?![가-힣\d])/g,
      function (m) { return stash(m, "hl-money"); });
    // Percent
    s = s.replace(/[+]\d+(?:\.\d+)?\s*%/g,
      function (m) { return stash(m, "hl-up"); });
    s = s.replace(/[-−]\d+(?:\.\d+)?\s*%/g,
      function (m) { return stash(m, "hl-down"); });
    s = s.replace(/\d+(?:\.\d+)?\s*%/g,
      function (m) { return stash(m, "hl-pct"); });
    // Rank
    s = s.replace(/\d+위/g,
      function (m) { return stash(m, "hl-rank"); });
    s = s.replace(/TOP\s*\d+/gi,
      function (m) { return stash(m, "hl-rank"); });
    // Quantity
    s = s.replace(/\d+(?:[,.]\d+)*만(?:\s*(?:명|장|건|개|종|회|달러|돌파))?/g,
      function (m) { return stash(m, "hl-num"); });
    // Date
    s = s.replace(/\d{1,2}월\s*\d{1,2}일/g,
      function (m) { return stash(m, "hl-date"); });

    var holderRe = new RegExp(HMARK + "(\\d+)" + HMARK, "g");
    s = s.replace(holderRe, function (_, idx) {
      var p = holders[parseInt(idx, 10)];
      return '<span class="' + p.cls + '">' + p.content + '</span>';
    });
    return s;
  }

  function pad2(n) { return n < 10 ? "0" + n : String(n); }
  function fmtMD(d) { var x = new Date(d + "T00:00:00"); return (x.getMonth()+1) + "/" + x.getDate(); }
  function fmtFull(s, e) {
    var sd = new Date(s + "T00:00:00"), ed = new Date(e + "T00:00:00");
    return sd.getFullYear() + "년 " + (sd.getMonth()+1) + "월 " + sd.getDate() + "일 — " +
      (ed.getMonth()+1) + "월 " + ed.getDate() + "일";
  }
  function badge(tag) { if (tag === "KR") return '<span class="badge badge-kr">KR</span>';
    if (tag === "GL") return '<span class="badge badge-gl">GL</span>'; return ""; }
  function shortHost(url) { try { return new URL(url).hostname.replace(/^www\./, ""); } catch (e) { return url; } }
  function cacheBust(u) { return u + (u.indexOf("?") >= 0 ? "&" : "?") + "_=" + Date.now(); }
  function fetchJson(u) {
    return fetch(cacheBust(u), { cache: "no-store" }).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status + " " + u); return r.json(); }); }

  function isoWeekId(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - day);
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return d.getUTCFullYear() + "-W" + (weekNo < 10 ? "0" + weekNo : weekNo);
  }
  function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

  var WEEK_CACHE = {};
  function loadWeek(id) {
    if (WEEK_CACHE[id]) return Promise.resolve(WEEK_CACHE[id]);
    return fetchJson(WEEK_URL(id)).then(function (r) { WEEK_CACHE[id] = r; return r; });
  }
  function countSections(r) {
    var s = (r && r.sections) || {};
    return {
      games: (s.launches_updates || []).length,
      charts: (s.chart_changes || []).length,
      industry: (s.industry_news || []).length,
      marketing: (s.marketing_community || []).length
    };
  }
  function balanceCounts(arr) { var kr=0, gl=0;
    (arr || []).forEach(function (it) { if (it.tag==="KR") kr++; else if (it.tag==="GL") gl++; });
    return { kr: kr, gl: gl };
  }

  var REPORTS_BY_ID = {};
  var REPORTS = [];
  var SELECTED_ID = null;
  var CAL_YEAR, CAL_MONTH;

  function renderCalendar() {
    var year = CAL_YEAR, month = CAL_MONTH;
    var first = new Date(year, month, 1);
    var firstDow = first.getDay();
    var offset = firstDow === 0 ? 6 : firstDow - 1;
    var start = new Date(year, month, 1 - offset);
    var today = new Date();
    var lastDay = new Date(year, month + 1, 0);
    var totalCells = offset + lastDay.getDate();
    var rows = Math.ceil(totalCells / 7);
    if (rows < 5) rows = 5;
    if (rows > 6) rows = 6;

    var html = '<div class="cal-hdr">' +
        '<button class="cal-nav" data-dir="-1" aria-label="이전">‹</button>' +
        '<span class="cal-title">' + year + '년 ' + (month + 1) + '월</span>' +
        '<button class="cal-nav" data-dir="1" aria-label="다음">›</button>' +
      '</div>' +
      '<div class="cal-dow">' +
        ['월','화','수','목','금','토','일'].map(function (d) { return '<span>' + d + '</span>'; }).join('') +
      '</div><div class="cal-weeks">';

    for (var w = 0; w < rows; w++) {
      var weekStart = new Date(start.getFullYear(), start.getMonth(), start.getDate() + w * 7);
      var weekId = isoWeekId(weekStart);
      var hasData = !!REPORTS_BY_ID[weekId];
      var isActive = weekId === SELECTED_ID;
      var classes = ['cal-week'];
      if (hasData) classes.push('has-data');
      if (isActive) classes.push('active');
      html += '<div class="' + classes.join(' ') + '" data-week-id="' + esc(weekId) + '">';
      for (var d = 0; d < 7; d++) {
        var dayDate = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + d);
        var inMonth = dayDate.getMonth() === month;
        var isToday = sameDay(dayDate, today);
        var dayClasses = ['cal-day'];
        if (!inMonth) dayClasses.push('outside');
        if (isToday) dayClasses.push('today');
        html += '<span class="' + dayClasses.join(' ') + '">' + dayDate.getDate() + '</span>';
      }
      html += '</div>';
    }
    html += '</div>';

    var cal = document.getElementById("calendar");
    cal.innerHTML = html;
    cal.querySelectorAll(".cal-nav").forEach(function (b) {
      b.addEventListener("click", function () {
        var dir = parseInt(b.getAttribute("data-dir"), 10);
        CAL_MONTH += dir;
        if (CAL_MONTH < 0) { CAL_MONTH = 11; CAL_YEAR--; }
        if (CAL_MONTH > 11) { CAL_MONTH = 0; CAL_YEAR++; }
        renderCalendar();
      });
    });
    cal.querySelectorAll(".cal-week.has-data").forEach(function (el) {
      el.addEventListener("click", function () { selectWeek(el.getAttribute("data-week-id")); });
    });
  }


  // --- Game icon auto-lookup (iTunes Search API via JSONP, cached in localStorage) ---
  var __iconJsonpN = 0;
  function iconTermFor(title) {
    var t = String(title || "");
    t = t.split("\u00d7")[0];                 // drop collab suffix after multiplication sign
    t = t.replace(/[(\uff08\u2014].*$/, "");   // drop "(...)", full-width paren, em-dash tails
    t = t.split(" - ")[0];
    var hy = t.indexOf("\uae30-");               // "...키우기-부제" -> keep left side
    if (hy > 2) t = t.slice(0, hy + 1);
    t = t.replace(/\s*\d+(\.\d+)?\s*['\u2018\u2019].*$/, ""); // "6.6 'Luna VII'" tails
    t = t.replace(/\s+\d*(\uc2dc\uc98c|\uc8fc\ub144).*$/, "").replace(/\s+\d+(\.\d+)?\s*$/, "");     // "시즌..." / "주년..." tails
    return t.trim();
  }
  function __iconNorm(s) { return String(s || "").toLowerCase().replace(/[^0-9a-z\uac00-\ud7a3]/g, ""); }
  function __iconMatches(term, trackName) {
    var q = __iconNorm(term), t = __iconNorm(trackName);
    if (!q || !t) return false;
    return t.indexOf(q.slice(0, 4)) !== -1 || q.indexOf(t.slice(0, 4)) !== -1 || t.indexOf(q) !== -1 || q.indexOf(t) !== -1;
  }
  function __iconJsonp(url, cb) {
    var name = "__wgbIconCb" + (__iconJsonpN++);
    var s = document.createElement("script");
    var done = false;
    window[name] = function (data) { done = true; cb(data); try { delete window[name]; } catch (e) { window[name] = undefined; } if (s.parentNode) s.parentNode.removeChild(s); };
    s.onerror = function () { if (!done) cb(null); if (s.parentNode) s.parentNode.removeChild(s); };
    s.src = url + "&callback=" + name;
    document.head.appendChild(s);
  }
  function __iconApply(span, url) {
    if (!span || !span.parentNode) return;
    var img = document.createElement("img");
    img.className = (span.className && span.className.indexOf("news-emoji") !== -1) ? "news-icon" : "game-icon";
    img.alt = "";
    img.loading = "lazy";
    img.onerror = function () { span.style.display = "inline"; if (img.parentNode) img.parentNode.removeChild(img); };
    img.src = url;
    span.parentNode.insertBefore(img, span);
    span.style.display = "none";
  }
  function enhanceGameIcons() {
    var spans = document.querySelectorAll("span[data-icon-term]");
    var delay = 0;
    Array.prototype.forEach.call(spans, function (span) {
      var term = span.getAttribute("data-icon-term");
      if (!term || term.length < 2) return;
      var key = "wgb_icon_v1_" + term;
      var cached = null;
      try { cached = JSON.parse(localStorage.getItem(key) || "null"); } catch (e) {}
      var now = Date.now();
      if (cached && cached.t && now - cached.t < 30 * 24 * 3600 * 1000) {
        if (cached.u) __iconApply(span, cached.u);   // cached miss (u:null) -> keep emoji
        return;
      }
      setTimeout(function () {
        var url = "https://itunes.apple.com/search?entity=software&country=kr&limit=3&term=" + encodeURIComponent(term);
        __iconJsonp(url, function (data) {
          var found = null;
          if (data && data.results) {
            for (var i = 0; i < data.results.length; i++) {
              var r = data.results[i];
              if (r && r.artworkUrl100 && __iconMatches(term, r.trackName)) { found = r.artworkUrl100.replace("100x100", "160x160"); break; }
            }
          }
          try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), u: found })); } catch (e) {}
          if (found) __iconApply(span, found);
        });
      }, delay);
      delay += 350;
    });
  }

  function renderGameCard(g, idx, isFeatured) {
    function row(label, value) {
      if (!value) return "";
      return '<div class="field-l">' + label + '</div><div class="field-v">' + highlight(value) + '</div>';
    }
    var tagClass = g.tag === "KR" ? "kr" : (g.tag === "GL" ? "gl" : "");
    var head = '<div class="num">No. ' + pad2(idx) + '</div>' +
      '<div class="game-head">' +
        (g.iconUrl
          ? '<img class="game-icon" src="' + esc(g.iconUrl) + '" alt="" loading="lazy" onerror="if(this.nextElementSibling&&this.nextElementSibling.className===\'game-emoji\'){this.nextElementSibling.style.display=\'inline\';}this.remove();">' +
            (g.emoji ? '<span class="game-emoji" style="display:none">' + esc(g.emoji) + '</span>' : '')
          : (g.emoji ? '<span class="game-emoji" data-icon-term="' + esc(g.iconTerm || iconTermFor(g.title)) + '">' + esc(g.emoji) + '</span>' : '')) +
        '<span class="game-title">' + esc(g.title || "") + '</span>' +
        (g.genre ? '<span class="game-genre">' + esc(g.genre) + '</span>' : '') +
        (g.tag ? ' ' + badge(g.tag) : '') +
      '</div>';
    var fields = '<div class="field-list">';
    fields += row("STATUS", g.status);
    fields += row("SCHEDULE", g.schedule);
    fields += row("FEATURES", g.features);
    fields += row("EDGE", g.differentiation);
    fields += row("WHY IT MATTERS", g.whyImportant);
    fields += '</div>';
    var src = g.sourceUrl
      ? '<a class="source-link" href="' + esc(g.sourceUrl) + '" target="_blank" rel="noopener">↗ ' + esc(shortHost(g.sourceUrl)) + '</a>'
      : '';
    return '<article class="game-card ' + tagClass + (isFeatured ? ' featured' : '') + '">' + head + fields + src + '</article>';
  }

  function renderNewsCard(n, idx) {
    var tagClass = n.tag === "KR" ? "kr" : (n.tag === "GL" ? "gl" : "");
    var head = '<div class="news-num">No. ' + pad2(idx) + '</div>' +
      '<div class="news-head">' +
        (n.iconTerm
          ? (n.emoji ? '<span class="news-emoji" data-icon-term="' + esc(n.iconTerm) + '">' + esc(n.emoji) + '</span>' : '')
          : n.logoUrl
            ? '<img class="news-icon" src="' + esc(n.logoUrl) + '" alt="" loading="lazy" onerror="var e=this.nextElementSibling;if(e&&e.className===\'news-emoji\')e.style.display=\'inline\';this.remove();" onload="if(!this.naturalWidth){var e=this.nextElementSibling;if(e&&e.className===\'news-emoji\')e.style.display=\'inline\';this.remove();}">' +
              (n.emoji ? '<span class="news-emoji" style="display:none">' + esc(n.emoji) + '</span>' : '')
            : (n.emoji ? '<span class="news-emoji">' + esc(n.emoji) + '</span>' : '')) +
        '<span class="news-title">' + esc(n.title || "") + '</span>' +
        (n.tag ? ' ' + badge(n.tag) : '') +
      '</div>';
    var body = n.body ? '<div class="news-body">' + highlight(n.body) + '</div>' : '';
    var src = '';
    if (n.sourceUrl) src = '<div class="news-source">↗ <a href="' + esc(n.sourceUrl) + '" target="_blank" rel="noopener">' + esc(shortHost(n.sourceUrl)) + '</a></div>';
    else if (n.source) src = '<div class="news-source">출처: ' + esc(n.source) + '</div>';
    return '<article class="news-card ' + tagClass + '">' + head + body + src + '</article>';
  }

  function renderSectionHdr(num, title, sub, items) {
    var bal = balanceCounts(items);
    return '<div class="section-hdr">' +
      '<div class="section-hdr-left">' +
        '<div class="section-num">' + num + '</div>' +
        '<div class="section-title-block">' +
          '<div class="section-title">' + esc(title) + '</div>' +
          '<div class="section-sub">' + esc(sub) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="section-balance">' +
        '<span class="bal-pill total">총 ' + items.length + '건</span>' +
        (bal.kr ? '<span class="bal-pill kr">KR ' + bal.kr + '</span>' : '') +
        (bal.gl ? '<span class="bal-pill gl">GL ' + bal.gl + '</span>' : '') +
      '</div>' +
    '</div>';
  }

  function renderWeek(r) {
    var sec = r.sections || {};
    var games = sec.launches_updates || [];
    var charts = sec.chart_changes || [];
    var industry = sec.industry_news || [];
    var marketing = sec.marketing_community || [];

    var toc = document.getElementById("tocBlock");
    if (toc) {
      toc.style.display = "block";
      document.getElementById("cnt-games").textContent = games.length;
      document.getElementById("cnt-charts").textContent = charts.length;
      document.getElementById("cnt-industry").textContent = industry.length;
      document.getElementById("cnt-marketing").textContent = marketing.length;
    }

    var masthead =
      '<header class="masthead"><div class="masthead-inner">' +
        '<div class="masthead-overline">Issue ' + esc(r.id) + (r.seed ? ' · SAMPLE' : '') + '</div>' +
        '<h1 class="masthead-title">' + esc(r.title || "이번 주 모바일 게임 동향 요약") + '</h1>' +
        '<div class="masthead-id-line">' +
          '<span class="masthead-id">' + esc(r.id) + '</span>' +
          '<span class="masthead-range">' + fmtFull(r.weekStart, r.weekEnd) + '</span>' +
          (r.publishedAt ? '<span class="masthead-meta">게시 ' + esc(r.publishedAt.split("T")[0]) + '</span>' : '') +
        '</div>' +
        (r.summary ? '<p class="masthead-summary">' + highlight(r.summary) + '</p>' : '') +
        '<div class="stat-row">' +
          '<div class="stat"><div class="stat-num">' + games.length + '</div><div class="stat-label">신작 · 업데이트</div></div>' +
          '<div class="stat"><div class="stat-num">' + charts.length + '</div><div class="stat-label">차트 · 순위</div></div>' +
          '<div class="stat"><div class="stat-num">' + industry.length + '</div><div class="stat-label">업계 뉴스</div></div>' +
          '<div class="stat"><div class="stat-num">' + marketing.length + '</div><div class="stat-label">마케팅 동향</div></div>' +
        '</div>' +
      '</div></header>';

    var content = '<div class="content"><div class="content-inner">';

    if (games.length) {
      content += '<section class="section" id="sec-games">';
      content += renderSectionHdr("01", "신작 · 업데이트 · CBT", "Launches & Major Updates", games);
      content += '<div class="games">';
      games.forEach(function (g, i) { content += renderGameCard(g, i + 1, i === 0); });
      content += '</div></section>';
    }
    if (charts.length) {
      content += '<section class="section" id="sec-charts">';
      content += renderSectionHdr("02", "차트 · 순위 변화", "Charts & Rankings", charts);
      content += '<div class="compact-grid">';
      charts.forEach(function (n, i) { content += renderNewsCard(n, i + 1); });
      content += '</div></section>';
    }
    if (industry.length) {
      content += '<section class="section" id="sec-industry">';
      content += renderSectionHdr("03", "업계 뉴스", "M&A · Investment · Financials · People", industry);
      content += '<div class="compact-grid">';
      industry.forEach(function (n, i) { content += renderNewsCard(n, i + 1); });
      content += '</div></section>';
    }
    if (marketing.length) {
      content += '<section class="section" id="sec-marketing">';
      content += renderSectionHdr("04", "마케팅 동향", "Marketing", marketing);
      content += '<div class="compact-grid">';
      marketing.forEach(function (n, i) { content += renderNewsCard(n, i + 1); });
      content += '</div></section>';
    }

    content += '<div class="footer-note">다음 호는 다음 월요일 09:30 발행.  ·  ' +
      '<a href="https://github.com/joonho78910/weekly-gaming-brief" target="_blank" rel="noopener">GitHub</a></div>';
    content += '</div></div>';

    document.getElementById("main").innerHTML = masthead + content;
    enhanceGameIcons();
  }

  function selectWeek(id) {
    SELECTED_ID = id;
    var r = REPORTS_BY_ID[id];
    if (r) {
      var sd = new Date(r.weekStart + "T00:00:00");
      CAL_YEAR = sd.getFullYear(); CAL_MONTH = sd.getMonth();
    }
    renderCalendar();
    document.getElementById("main").innerHTML = '<div class="loading">' + esc(id) + ' 보고서 로딩 중...</div>';
    loadWeek(id).then(function (data) {
      renderWeek(data);
      try { localStorage.setItem("wgb_last_viewed", id); } catch (e) {}
      document.querySelectorAll(".toc-item").forEach(function (el) {
        el.onclick = function () {
          var key = el.getAttribute("data-toc");
          var map = { games: "sec-games", charts: "sec-charts", industry: "sec-industry", marketing: "sec-marketing" };
          var target = document.getElementById(map[key]);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        };
      });
    }).catch(function (err) {
      document.getElementById("main").innerHTML =
        '<div class="content"><div class="content-inner"><div class="placeholder"><div class="icon">⚠️</div><h2>보고서를 불러오지 못했습니다</h2><div>' + esc(err.message) + '</div></div></div></div>';
    });
  }

  fetchJson(INDEX_URL).then(function (idx) {
    REPORTS = (idx.reports || []).slice().sort(function (a, b) { return a.weekStart < b.weekStart ? 1 : -1; });
    REPORTS.forEach(function (r) { REPORTS_BY_ID[r.id] = r; });

    if (!REPORTS.length) {
      var today = new Date();
      CAL_YEAR = today.getFullYear(); CAL_MONTH = today.getMonth();
      renderCalendar();
      document.getElementById("main").innerHTML =
        '<div class="content"><div class="content-inner"><div class="placeholder"><div class="icon">⏳</div><h2>아직 도착한 보고서가 없습니다</h2><div>매주 월요일 09:30에 자동으로 추가됩니다.</div></div></div></div>';
      return;
    }

    var forceLatest = /[?&]latest(=|&|$)/.test(location.search) || location.hash === "#latest";
    var last = null;
    try { last = localStorage.getItem("wgb_last_viewed"); } catch (e) {}
    var initial = (!forceLatest && last && REPORTS_BY_ID[last]) ? last : REPORTS[0].id;
    var initReport = REPORTS_BY_ID[initial];
    var sd = new Date(initReport.weekStart + "T00:00:00");
    CAL_YEAR = sd.getFullYear(); CAL_MONTH = sd.getMonth();
    SELECTED_ID = initial;

    renderCalendar();
    selectWeek(initial);

    fetchJson(VER_URL).then(function (v) {
      var meta = document.getElementById("topbar-meta");
      var verLabel = "v" + (v.version || "?");
      if (v.lastBuild && v.lastBuild.targetWeek) verLabel += " · " + v.lastBuild.targetWeek;
      if (v.lastBuild && v.lastBuild.n) verLabel += " · build " + v.lastBuild.n;
      meta.innerHTML =
        '<span class="chip">누적 ' + REPORTS.length + '개 주차</span>' +
        '<span class="chip">' + esc(verLabel) + '</span>' +
        '<span class="chip live">매주 월요일 09:30 자동 갱신</span>';
    }).catch(function () {});
  }).catch(function (err) {
    document.getElementById("calendar").innerHTML = '<div class="empty-state">로드 실패</div>';
    document.getElementById("main").innerHTML =
      '<div class="content"><div class="content-inner"><div class="placeholder"><div class="icon">⚠️</div><h2>인덱스를 불러오지 못했습니다</h2><div>' + esc(err.message) + '</div></div></div></div>';
  });
})();
</script>
